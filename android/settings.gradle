pluginManagement {
    repositories {
        maven { url = uri("https://maven.aliyun.com/repository/gradle-plugin") }
        maven { url = uri("https://maven.aliyun.com/repository/google") }
        maven { url = uri("https://maven.aliyun.com/repository/public") }
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    includeBuild("../node_modules/@react-native/gradle-plugin")
}

plugins { id("com.facebook.react.settings") }

dependencyResolutionManagement {
    repositoriesMode.set(org.gradle.api.initialization.resolve.RepositoriesMode.PREFER_SETTINGS)
    repositories {
        maven { url = uri("https://maven.aliyun.com/repository/google") }
        maven { url = uri("https://maven.aliyun.com/repository/public") }
        google()
        mavenCentral()
    }
}

def repoRoot = file("..")
def autolinkCommand = System.properties["os.name"].toLowerCase().contains("windows")
    ? ["cmd", "/c", "npx", "@react-native-community/cli", "config"]
    : ["npx", "@react-native-community/cli", "config"]
def autolinkLockFiles = files(
    "../package.json",
    "../package-lock.json",
    "../node_modules/.package-lock.json",
    "../react-native.config.js",
    "../yarn.lock"
)

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand(autolinkCommand, repoRoot, autolinkLockFiles)
}
rootProject.name = 'VisionGenieApp'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
