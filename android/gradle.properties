# Project-wide Gradle settings.

# 1. 内存与编码优化 (解决 Process 'command 'cmd'' finished with non-zero exit value 268435659)
# 增加堆内存到 4GB，并强制 UTF-8 编码，防止 Windows 路径字符报错
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8

# 2. 核心架构配置
# 开启 AndroidX 支持
android.useAndroidX=true

# 指定 CPU 架构（优化打包速度，主要针对华为等主流真机）
reactNativeArchitectures=arm64-v8a,armeabi-v7a

# 3. 引擎与新架构配置 (针对 RN 0.82+)
# 必须开启 Hermes 引擎以适配新架构
hermesEnabled=true

# 注意：不要在此处添加 newArchEnabled=false。
# 在 RN 0.82+ 中，系统会默认处理新架构逻辑，手动关闭会导致编译脚本冲突。

# 4. UI 渲染设置
# 禁用沉浸式底栏（边缘到边缘显示），保持开发环境 UI 稳定
edgeToEdgeEnabled=false

# 5. Windows 开发环境稳定性补丁
# 解决资源 ID 冲突和传递性类库解析问题
android.nonTransitiveRClass=true
android.nonFinalResIds=false

# 6. 其他常用优化
# 开启并行构建（如果你的电脑配置较高，可取消下方注释）
# org.gradle.parallel=true